name: Build m-ovito Windows

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  build-windows:
    name: Build (Windows x64, MSVC 2019)
    runs-on: windows-2019

    env:
      DEPS_DIR: ${{ github.workspace }}\deps
      SOURCE_DIR: ${{ github.workspace }}\source
      BUILD_DIR: ${{ github.workspace }}\build
      INSTALL_DIR: ${{ github.workspace }}\install

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout source at the pinned commit
      # -----------------------------------------------------------------------
      - name: Checkout m-ovito
        uses: actions/checkout@v4
        with:
          repository: blualg/m-ovito
          ref: 8aca5c096523b8e91bd3214ccfe2b21bd5a06fbe
          path: source

      # -----------------------------------------------------------------------
      # 2. Cache the entire deps directory to skip re-downloading on re-runs
      # -----------------------------------------------------------------------
      - name: Cache dependencies
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: ${{ env.DEPS_DIR }}
          key: windows-deps-v3

      # -----------------------------------------------------------------------
      # 3. Install Qt 5.12.5 via aqtinstall (matches CI exactly)
      # -----------------------------------------------------------------------
      - name: Install Qt 5.12.5 (msvc2017_64)
        uses: jurplel/install-qt-action@v3
        with:
          version: "5.12.5"
          host: windows
          target: desktop
          arch: win64_msvc2017_64
          dir: ${{ github.workspace }}\Qt
          cache: true

      # -----------------------------------------------------------------------
      # 4. Download & build all C++ dependencies (only when cache misses)
      # -----------------------------------------------------------------------

      # --- zlib ---
      - name: Build zlib
        if: steps.cache-deps.outputs.cache-hit != 'true'
        shell: cmd
        run: |
          call "C:\Program Files (x86)\Microsoft Visual Studio\2019\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          mkdir %DEPS_DIR%\zlib-src
          cd %DEPS_DIR%\zlib-src
          curl -L https://github.com/madler/zlib/releases/download/v1.3.1/zlib131.zip -o zlib.zip
          7z x zlib.zip -y
          cd zlib-1.3.1
          cmake -G "NMake Makefiles" ^
                -DCMAKE_BUILD_TYPE=Release ^
                -DCMAKE_INSTALL_PREFIX=%DEPS_DIR%\zlib .
          nmake install

      # --- Boost (headers only) ---
      - name: Download Boost 1.70 headers
        if: steps.cache-deps.outputs.cache-hit != 'true'
        shell: cmd
        run: |
          mkdir %DEPS_DIR%\boost_src
          cd %DEPS_DIR%\boost_src
          curl -L https://archives.boost.io/release/1.70.0/source/boost_1_70_0.zip -o boost.zip
          7z x boost.zip -y -o%DEPS_DIR%
          ren %DEPS_DIR%\boost_1_70_0 boost

      # --- HDF5 ---
      - name: Install HDF5
        if: steps.cache-deps.outputs.cache-hit != 'true'
        shell: cmd
        run: |
          cd %DEPS_DIR%
          curl -L https://github.com/HDFGroup/hdf5/releases/download/hdf5-1_12_2/hdf5-1_12_2-Std-win10_64-vs16.zip -o hdf5.zip
          7z x hdf5.zip -y
          ren HDF5-1.12.2-win64 hdf5

      # --- netCDF ---
      - name: Install netCDF
        if: steps.cache-deps.outputs.cache-hit != 'true'
        shell: cmd
        run: |
          cd %DEPS_DIR%
          curl -L https://downloads.unidata.ucar.edu/netcdf-c/4.9.0/netCDF4.9.0-NC4-64.exe -o netcdf_installer.exe
          netcdf_installer.exe /S /D=%DEPS_DIR%\netcdf

      # --- Python 3.7 embedded + dev ---
      - name: Install Python 3.7
        if: steps.cache-deps.outputs.cache-hit != 'true'
        shell: cmd
        run: |
          cd %DEPS_DIR%
          curl -L https://www.python.org/ftp/python/3.7.9/python-3.7.9-amd64.exe -o python_install.exe
          python_install.exe /quiet InstallAllUsers=0 TargetDir=%DEPS_DIR%\Python ^
            Include_pip=1 Include_dev=1 Include_symbols=1
          :: Wait for installer
          timeout /t 30

      # --- QScintilla 2.11.2 ---
      - name: Build QScintilla
        if: steps.cache-deps.outputs.cache-hit != 'true'
        shell: cmd
        run: |
          call "C:\Program Files (x86)\Microsoft Visual Studio\2019\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cd %DEPS_DIR%
          curl -L https://www.riverbankcomputing.com/static/Downloads/QScintilla/2.11.2/QScintilla_gpl-2.11.2.zip -o qscintilla.zip
          7z x qscintilla.zip -y
          cd QScintilla_gpl-2.11.2\Qt4Qt5
          qmake qscintilla.pro CONFIG+=release
          nmake
          mkdir %DEPS_DIR%\qscintilla\release
          copy release\qscintilla2_qt5.lib %DEPS_DIR%\qscintilla\release\

      # --- FFmpeg (libav) pre-built ---
      - name: Download FFmpeg dev libs
        if: steps.cache-deps.outputs.cache-hit != 'true'
        shell: cmd
        run: |
          cd %DEPS_DIR%
          curl -L https://www.gyan.dev/ffmpeg/builds/packages/ffmpeg-4.4.4-full_build-shared.7z -o ffmpeg.7z
          7z x ffmpeg.7z -y
          :: Rename to standard name expected by cmake
          for /d %%i in (ffmpeg-4*) do ren "%%i" libav_src
          mkdir libav\include
          mkdir libav\bin
          xcopy /E /I libav_src\include libav\include
          xcopy /E /I libav_src\bin libav\bin

      # --- libssh ---
      - name: Build libssh
        if: steps.cache-deps.outputs.cache-hit != 'true'
        shell: cmd
        run: |
          call "C:\Program Files (x86)\Microsoft Visual Studio\2019\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cd %DEPS_DIR%
          curl -L https://www.libssh.org/files/0.9/libssh-0.9.6.tar.xz -o libssh.tar.xz
          7z x libssh.tar.xz -y
          7z x libssh.tar -y
          cd libssh-0.9.6
          cmake -G "NMake Makefiles" ^
                -DCMAKE_BUILD_TYPE=Release ^
                -DCMAKE_INSTALL_PREFIX=%DEPS_DIR%\libssh ^
                -DOPENSSL_ROOT_DIR=%DEPS_DIR%\openssl ^
                -DWITH_SFTP=ON ^
                -DWITH_SERVER=OFF ^
                -DBUILD_SHARED_LIBS=OFF .
          nmake install

      # --- OpenSSL (use pre-built from choco for simplicity) ---
      - name: Install OpenSSL
        if: steps.cache-deps.outputs.cache-hit != 'true'
        shell: cmd
        run: |
          choco install openssl --version=1.1.1.2100 -y --no-progress
          :: Copy to deps dir so cmake can find it
          xcopy /E /I "C:\Program Files\OpenSSL-Win64" %DEPS_DIR%\openssl

      # -----------------------------------------------------------------------
      # 5. Configure with CMake
      # -----------------------------------------------------------------------
      - name: Configure CMake
        shell: cmd
        run: |
          call "C:\Program Files (x86)\Microsoft Visual Studio\2019\Enterprise\VC\Auxiliary\Build\vcvars64.bat"

          mkdir %BUILD_DIR%
          cd %BUILD_DIR%

          cmake -G "NMake Makefiles" ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DCMAKE_INSTALL_PREFIX=%INSTALL_DIR% ^
            -DOVITO_REDISTRIBUTABLE_PACKAGE=ON ^
            -DOVITO_BUILD_MONOLITHIC=ON ^
            -DOVITO_DOUBLE_PRECISION_FP=ON ^
            -DOVITO_BUILD_DOCUMENTATION=OFF ^
            -DOVITO_BUILD_PLUGIN_VR=OFF ^
            -DOVITO_BUILD_PLUGIN_OSPRAY=OFF ^
            -DCMAKE_PREFIX_PATH=%Qt5_DIR% ^
            -DZLIB_INCLUDE_DIR=%DEPS_DIR%\zlib\include ^
            -DZLIB_LIBRARY=%DEPS_DIR%\zlib\lib\zlib.lib ^
            -DBOOST_INCLUDEDIR=%DEPS_DIR%\boost ^
            -DHDF5_DIR=%DEPS_DIR%\hdf5\cmake\hdf5 ^
            -Dnetcdf_DIR=%DEPS_DIR%\netcdf\lib\cmake\netCDF ^
            -DQSCINTILLA_INCLUDE_DIR=%DEPS_DIR%\QScintilla_gpl-2.11.2\Qt4Qt5 ^
            -DQSCINTILLA_LIBRARY=%DEPS_DIR%\qscintilla\release\qscintilla2_qt5.lib ^
            -DPYTHON_EXECUTABLE=%DEPS_DIR%\Python\python.exe ^
            -DPYTHON_INCLUDE_DIR=%DEPS_DIR%\Python\include ^
            -DPYTHON_LIBRARY=%DEPS_DIR%\Python\libs\python37.lib ^
            -DLIBAV_INCLUDE_DIR=%DEPS_DIR%\libav\include ^
            -DLIBAV_LIBRARY_DIR=%DEPS_DIR%\libav\bin ^
            -DLIBSSH_INCLUDE_DIR=%DEPS_DIR%\libssh\include ^
            -DLIBSSH_LIBRARY=%DEPS_DIR%\libssh\lib\ssh.lib ^
            -DOPENSSL_ROOT_DIR=%DEPS_DIR%\openssl ^
            %SOURCE_DIR%

      # -----------------------------------------------------------------------
      # 6. Build
      # -----------------------------------------------------------------------
      - name: Build
        shell: cmd
        run: |
          call "C:\Program Files (x86)\Microsoft Visual Studio\2019\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cd %BUILD_DIR%
          nmake

      # -----------------------------------------------------------------------
      # 7. Package
      # -----------------------------------------------------------------------
      - name: Package (ZIP + NSIS installer)
        shell: cmd
        run: |
          call "C:\Program Files (x86)\Microsoft Visual Studio\2019\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cd %BUILD_DIR%
          cpack
          cpack -G ZIP

      # -----------------------------------------------------------------------
      # 8. Upload artifacts
      # -----------------------------------------------------------------------
      - name: Upload installer (.exe)
        uses: actions/upload-artifact@v4
        with:
          name: m-ovito-windows-installer
          path: ${{ env.BUILD_DIR }}\ovito-*.exe
          if-no-files-found: warn
          retention-days: 30

      - name: Upload ZIP package
        uses: actions/upload-artifact@v4
        with:
          name: m-ovito-windows-zip
          path: ${{ env.BUILD_DIR }}\ovito-*.zip
          if-no-files-found: warn
          retention-days: 30
