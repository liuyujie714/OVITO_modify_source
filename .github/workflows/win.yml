name: Build Windows x64 Ovito

on:
  push:
    branches:
      - master

env:
  ovito_version: "3.10.6"
  ovito_src: "ovito-v3.10.6-modified-source"

jobs:
  Windows:
    runs-on: windows-2022
    if: github.event.repository.owner.id == github.event.sender.id
    steps:
