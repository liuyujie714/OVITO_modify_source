name: Use Docker Image in CI
on:
  push:
    branches: [master]

jobs:
  LinuxOvito:
    runs-on: ubuntu-latest
    
    steps:
      - name: Pull and run
        run: |
          docker pull registry.gitlab.com/stuko/ovito/linux_build:latest
          docker run --rm registry.gitlab.com/stuko/ovito/linux_build:latest bash -c "
            apt-get update && \
            git clone --recursive https://gitlab.com/stuko/ovito.git  && \
            cd ovito && git checkout v3.10.6 && mkdir build && cd build && \
            cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=../Install && \
            make install -j4
          "
