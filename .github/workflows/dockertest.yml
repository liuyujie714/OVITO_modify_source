name: Use Docker Image in CI
on:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      # 构建镜像（基于你的 GitLab 镜像）
      - name: Build image
        run: |
          docker build -t myapp:latest \
            --build-arg BASE_IMAGE=registry.gitlab.com/stuko/ovito/linux_build:latest .
      
      # 测试：在容器里安装 GROMACS
      - name: Install GROMACS and test
        run: |
          docker run --rm myapp:latest bash -c "
            apt-get update && \
            apt-get install -y gromacs && \
            gmx --version
          "
          
